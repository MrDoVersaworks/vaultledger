name: VaultLedger CI

# ─────────────────────────────────────────────────────────────
# Continuous Integration (CI) — Type Check & Build Verification
# Continuous Deployment (CD) — Handled by Vercel (auto-deploys on push to main)
#
# E2E Playwright tests are local-only (require a live database
# and backend server via .env). Run locally with:
#   cd frontend && npx playwright test --headed
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-audit:
    name: Backend — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build Check
        run: npm run build

  frontend-audit:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
